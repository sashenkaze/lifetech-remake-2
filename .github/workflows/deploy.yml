name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Ganti dengan master jika branch utama Anda bernama master

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-node: '22' # Sesuaikan dengan versi Node Anda

      - name: Install dependencies
        run: npm ci # Lebih cepat dan bersih daripada npm install

      - name: Deploy to GitHub Pages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@://github.com"
          npm run deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}